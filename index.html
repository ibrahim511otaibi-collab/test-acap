<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الجودة - مركز الفروانية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --auditor: #2d5a27; --manager: #0056b3; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; direction: rtl; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 600px; margin: auto; border-right: 8px solid; }
        .auditor-card { border-right-color: var(--auditor); }
        .manager-card { border-right-color: var(--manager); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; color: #000 !important; }
        .locked { background-color: #eee !important; color: #333 !important; font-weight: bold; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-wa { background: #25D366; margin-top: 10px; }
        .btn-save { background: var(--auditor); }
        .btn-reply { background: var(--manager); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card auditor-card" id="box1">
    <h3>📋 تسجيل حالة جديدة</h3>
    <div class="form-group">
        <label>رقم الحالة:</label>
        <input type="text" id="id" readonly class="locked">
    </div>
    <div class="form-group">
        <label>اسم المدقق:</label>
        <input type="text" id="aud">
    </div>
    <div class="form-group">
        <label>الوصف:</label>
        <textarea id="dsc" rows="3"></textarea>
    </div>
    <div id="btnsAuditor">
        <button class="btn btn-save" onclick="saveData('auditor')">💾 حفظ في الشيت</button>
        <button class="btn btn-wa" onclick="sendWA()">📱 إرسال للمسؤول</button>
    </div>
</div>

<div class="card manager-card hidden" id="box2">
    <h3>🛠️ رد المسؤول</h3>
    <div class="form-group">
        <label>الإجراء التصحيحي:</label>
        <textarea id="act" rows="3"></textarea>
    </div>
    <div class="form-group">
        <label>اسم المسؤول:</label>
        <input type="text" id="mng">
    </div>
    <button class="btn btn-reply" onclick="saveData('manager')">✅ اعتماد الرد</button>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwQzvwODnfD7Syz-i1htjZDU36zcFhbJCN0lN69fM5Hij-2kwr-BVi_vbhkx9LQ7_Bu/exec";

    // أول ما تفتح الصفحة، هالكود يشتغل غصب
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        
        if (urlParams.has('id')) {
            // يعني المسؤول فتح الرابط
            document.getElementById('id').value = urlParams.get('id');
            document.getElementById('aud').value = urlParams.get('aud');
            document.getElementById('dsc').value = urlParams.get('dsc');
            
            // قفل الخانات
            document.getElementById('aud').readOnly = true;
            document.getElementById('aud').classList.add('locked');
            document.getElementById('dsc').readOnly = true;
            document.getElementById('dsc').classList.add('locked');
            
            // إظهار واجهة المسؤول
            document.getElementById('box2').classList.remove('hidden');
            document.getElementById('btnsAuditor').classList.add('hidden');
        } else {
            // يعني المدقق فتح الصفحة
            document.getElementById('id').value = "NCR-" + Math.floor(Math.random() * 9000 + 1000);
        }
    };

    function sendWA() {
        const id = document.getElementById('id').value;
        const aud = document.getElementById('aud').value;
        const dsc = document.getElementById('dsc').value;
        
        const cleanURL = window.location.href.split('?')[0];
        // الرابط اللي راح يروح للمسؤول
        const link = `${cleanURL}?id=${encodeURIComponent(id)}&aud=${encodeURIComponent(aud)}&dsc=${encodeURIComponent(dsc)}`;
        
        const msg = `*حالة جودة جديدة*%0Aالرقم: ${id}%0Aالوصف: ${dsc}%0A%0A*رابط الرد:*%0A${link}`;
        window.open(`https://wa.me/96566695443?text=${msg}`, '_blank');
    }

    function saveData(mode) {
        const btn = event.target;
        btn.disabled = true;
        btn.innerText = "جاري الحفظ...";

        const payload = {
            id: document.getElementById('id').value,
            auditor: document.getElementById('aud').value,
            desc: document.getElementById('dsc').value,
            action: document.getElementById('act') ? document.getElementById('act').value : "",
            manager: document.getElementById('mng') ? document.getElementById('mng').value : ""
        };

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => {
            alert("تم الحفظ بنجاح!");
            btn.disabled = false;
            btn.innerText = "تم الحفظ";
        });
    }
</script>

</body>
</html>
