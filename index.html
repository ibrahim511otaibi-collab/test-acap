<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الجودة - مركز الفروانية</title>
    <style>
        :root { --auditor-color: #2d5a27; --manager-color: #0056b3; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); padding: 20px; direction: rtl; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border-right: 10px solid; }
        .auditor-card { border-right-color: var(--auditor-color); }
        .manager-card { border-right-color: var(--manager-color); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; color: #000 !important; }

        .locked {
            background-color: #f0f0f0 !important;
            cursor: not-allowed;
            border: 1px solid #ccc !important;
            color: #555 !important;
            font-weight: bold;
            pointer-events: none;
        }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-save { background: var(--auditor-color); }
        .btn-wa { background: #25D366; }
        .btn-reply { background: var(--manager-color); }
        .hidden { display: none; }
        h2, h3 { text-align: center; color: #444; }

        #loadingScreen {
            display: none;
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>نظام إدارة عدم المطابقة (NCR)</h2>

    <div id="loadingScreen">
        ⏳ جاري تحميل بيانات الحالة... يرجى الانتظار
    </div>

    <div id="auditorBox" class="card auditor-card">
        <h3>📋 تسجيل حالة جديدة</h3>
        <div class="form-group">
            <label>رقم الحالة (ID):</label>
            <input type="text" id="id" class="locked" readonly>
        </div>
        <div class="form-group">
            <label>اسم المدقق:</label>
            <input type="text" id="auditor" placeholder="أدخل اسمك">
        </div>
        <div class="form-group">
            <label>مصدر الحالة:</label>
            <select id="source">
                <option value="شكوى">شكوى</option>
                <option value="تدقيق داخلي">تدقيق داخلي</option>
                <option value="ملاحظة">ملاحظة</option>
                <option value="تحليل بيانات">تحليل بيانات</option>
            </select>
        </div>
        <div class="form-group">
            <label>مستوى الخطورة:</label>
            <select id="risk">
                <option value="منخفضة">منخفضة</option>
                <option value="متوسطة">متوسطة</option>
                <option value="عالية">عالية</option>
            </select>
        </div>
        <div class="form-group">
            <label>وصف عدم المطابقة:</label>
            <textarea id="desc" rows="3" placeholder="اشرح الملاحظة هنا..."></textarea>
        </div>
        <div id="auditorButtons">
            <button id="btnSave" class="btn btn-save" onclick="saveAndSendWA()">💾 حفظ وإرسال واتساب للمسؤول</button>
        </div>
    </div>

    <div id="managerBox" class="card manager-card hidden">
        <h3>🛠️ رد الإدارة والمسؤول</h3>
        <div class="form-group">
            <label>رقم الحالة:</label>
            <input type="text" id="idDisplay" class="locked" readonly>
        </div>
        <div class="form-group">
            <label>اسم المدقق:</label>
            <input type="text" id="auditorDisplay" class="locked" readonly>
        </div>
        <div class="form-group">
            <label>مصدر الحالة:</label>
            <input type="text" id="sourceDisplay" class="locked" readonly>
        </div>
        <div class="form-group">
            <label>مستوى الخطورة:</label>
            <input type="text" id="riskDisplay" class="locked" readonly>
        </div>
        <div class="form-group">
            <label>وصف عدم المطابقة:</label>
            <textarea id="descDisplay" rows="3" class="locked" readonly></textarea>
        </div>
        <hr>
        <div class="form-group">
            <label>السبب الجذري (Root Cause):</label>
            <textarea id="rootCause" rows="3" placeholder="لماذا حدثت المشكلة؟"></textarea>
        </div>
        <div class="form-group">
            <label>الإجراء التصحيحي (Action):</label>
            <textarea id="action" rows="3" placeholder="ما هو الإجراء المتخذ؟"></textarea>
        </div>
        <div class="form-group">
            <label>اسم المسؤول المعتمد:</label>
            <input type="text" id="manager" placeholder="اسم المسؤول">
        </div>
        <button class="btn btn-reply" onclick="sendToGoogle('manager')">✅ إرسال الرد وتحديث السطر</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyIXvbs9EHHsrt7WF8L5dAprsqg6vzFSgRzO5GiGQxFJanwK_ItO-gxhchsmznGEcWs/exec";
    const siteURL = "https://ibrahim511otaibi-collab.github.io/QualityFarwaniya/";

    // دالة محسنة لجلب المعرف من الرابط لضمان عملها على الهواتف
    function getParam(name) {
        const url = window.location.href;
        const nameClean = name.replace(/[\[\]]/g, '\\$&');
        const regex = new RegExp('[?&]' + nameClean + '(=([^&#]*)|&|#|$)');
        const results = regex.exec(url);
        if (!results) return null;
        if (!results[2]) return '';
        return decodeURIComponent(results[2].replace(/\+/g, ' '));
    }

    async function initPage() {
        const idVal = getParam('id');

        if (idVal && idVal.trim() !== "") {
            document.getElementById('auditorBox').classList.add('hidden');
            document.getElementById('loadingScreen').style.display = 'block';

            try {
                const response = await fetch(`${scriptURL}?id=${idVal}&t=${new Date().getTime()}`);
                const data = await response.json();

                if (data && data.id) {
                    document.getElementById('idDisplay').value      = data.id;
                    document.getElementById('auditorDisplay').value = data.auditor || "";
                    document.getElementById('sourceDisplay').value  = data.source || "";
                    document.getElementById('riskDisplay').value    = data.risk || "";
                    document.getElementById('descDisplay').value    = data.desc || "";

                    document.getElementById('loadingScreen').style.display = 'none';
                    document.getElementById('managerBox').classList.remove('hidden');
                } else {
                    document.getElementById('loadingScreen').innerHTML = "⚠️ الحالة غير موجودة في السجل.<br><small>تأكد من أن المدقق قد أتم عملية الحفظ أولاً.</small>";
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loadingScreen').innerText = "❌ حدث خطأ في الاتصال بالخادم. أعد تحميل الصفحة.";
            }
        } else {
            document.getElementById('id').value = "NCR-" + Math.floor(1000 + Math.random() * 9000);
        }
    }

    window.addEventListener('load', initPage);

    async function saveAndSendWA() {
        const id  = document.getElementById('id').value;
        const aud = document.getElementById('auditor').value;
        const src = document.getElementById('source').value;
        const rsk = document.getElementById('risk').value;
        const dsc = document.getElementById('desc').value;

        if (!aud || !dsc) {
            alert("الرجاء تعبئة اسم المدقق والوصف قبل الإرسال.");
            return;
        }

        const btn = document.getElementById('btnSave');
        btn.disabled = true;
        btn.innerText = "⏳ جاري الحفظ في السجل...";

        const payload = { id, auditor: aud, source: src, risk: rsk, desc: dsc, rootCause: "", action: "", manager: "" };

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                body: JSON.stringify(payload)
            });

            btn.innerText = "⏳ جاري توجيهك للواتساب...";
            const shortPageUrl = siteURL + "?id=" + id;
            const msgText = `*تنبيه جودة (NCR)*\nرقم الحالة: ${id}\nالمدقق: ${aud}\nالوصف: ${dsc}\n---\n*يرجى الرد عبر الرابط التالي:*\n${shortPageUrl}`;
            
            // توجيه نهائي ومباشر
            window.location.replace(`https://wa.me/96566695443?text=${encodeURIComponent(msgText)}`);

        } catch (err) {
            alert("حدث خطأ أثناء الحفظ.");
            btn.disabled = false;
            btn.innerText = "💾 حفظ وإرسال واتساب للمسؤول";
        }
    }

    function sendToGoogle(mode) {
        const btn = event.target;
        btn.disabled = true;
        btn.innerText = "جاري التحديث...";

        const payload = {
            id: document.getElementById('idDisplay').value,
            rootCause: document.getElementById('rootCause').value || "",
            action: document.getElementById('action').value || "",
            manager: document.getElementById('manager').value || ""
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert("✅ تم تحديث السجل واعتماد الرد بنجاح.");
            window.location.href = siteURL; // العودة للرئيسية
        })
        .catch(err => {
            alert("خطأ في التحديث.");
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
