<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام NCR - مركز الفروانية</title>
    <style>
        :root { --primary: #2d5a27; --secondary: #0056b3; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; direction: rtl; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 8px solid var(--primary); }
        .manager-border { border-top-color: var(--secondary); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; color: #000; }
        /* تصميم الخانات المقفولة للمسؤول */
        .locked { background-color: #eeeeee !important; color: #000000 !important; font-weight: bold; border: 1px solid #ccc !important; cursor: not-allowed; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-save { background: var(--primary); }
        .btn-wa { background: #25D366; }
        .btn-manager { background: var(--secondary); }
        .hidden { display: none; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>نظام إدارة عدم المطابقة</h2>

    <div id="auditorSection" class="card">
        <div class="form-group">
            <label>رقم الحالة:</label>
            <input type="text" id="id" readonly class="locked">
        </div>
        <div class="form-group">
            <label>اسم المدقق:</label>
            <input type="text" id="auditor" placeholder="أدخل اسمك">
        </div>
        <div class="form-group">
            <label>وصف الملاحظة:</label>
            <textarea id="desc" rows="4" placeholder="اكتب تفاصيل الملاحظة هنا..."></textarea>
        </div>
        <div id="auditorActions">
            <button class="btn btn-save" onclick="saveData('auditor')">💾 حفظ في السجل</button>
            <button class="btn btn-wa" onclick="sendToWhatsApp()">📱 إرسال للمسؤول</button>
        </div>
    </div>

    <div id="managerSection" class="card manager-border hidden">
        <h3>🛠️ رد المسؤول</h3>
        <div class="form-group">
            <label>الإجراء التصحيحي المتخذ:</label>
            <textarea id="action" rows="3" placeholder="ماذا فعلت لحل المشكلة؟"></textarea>
        </div>
        <div class="form-group">
            <label>اسم المسؤول:</label>
            <input type="text" id="managerName" placeholder="أدخل اسمك">
        </div>
        <button class="btn btn-manager" onclick="saveData('manager')">✅ اعتماد الرد وتحديث الشيت</button>
    </div>
</div>

<script>
    // رابط السكربت الخاص بك
    const scriptURL = "https://script.google.com/macros/s/AKfycbwQzvwODnfD7Syz-i1htjZDU36zcFhbJCN0lN69fM5Hij-2kwr-BVi_vbhkx9LQ7_Bu/exec";

    // --- وظيفة التشغيل التلقائي عند فتح الصفحة ---
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // فحص: هل الرابط يحتوي على id؟ (يعني مسؤول)
        if (urlParams.has('id')) {
            console.log("تم التعرف على وضع المسؤول");

            // 1. سحب البيانات من الرابط وتعبئتها
            document.getElementById('id').value = urlParams.get('id');
            document.getElementById('auditor').value = decodeURIComponent(urlParams.get('aud') || "");
            document.getElementById('desc').value = decodeURIComponent(urlParams.get('dsc') || "");

            // 2. قفل خانات المدقق (عشان المسؤول ما يغيرها)
            document.getElementById('auditor').readOnly = true;
            document.getElementById('auditor').classList.add('locked');
            document.getElementById('desc').readOnly = true;
            document.getElementById('desc').classList.add('locked');

            // 3. تبديل الواجهة (إظهار قسم المسؤول)
            document.getElementById('managerSection').classList.remove('hidden');
            document.getElementById('auditorActions').classList.add('hidden');
        } else {
            // وضع المدقق: نولد رقم جديد
            document.getElementById('id').value = "NCR-" + Math.floor(1000 + Math.random() * 9000);
        }
    };

    // --- وظيفة إرسال الواتساب ---
    function sendToWhatsApp() {
        const id = document.getElementById('id').value;
        const aud = document.getElementById('auditor').value;
        const dsc = document.getElementById('desc').value;

        if(!aud || !dsc) { alert("أكمل البيانات أولاً"); return; }

        // بناء رابط المسؤول (الرابط الحالي + البيانات)
        const baseUrl = window.location.href.split('?')[0];
        const finalLink = `${baseUrl}?id=${id}&aud=${encodeURIComponent(aud)}&dsc=${encodeURIComponent(dsc)}`;

        const msg = `*إشعار عدم مطابقة جديد*%0Aرقم الحالة: ${id}%0Aالمدقق: ${aud}%0Aالوصف: ${dsc}%0A---%0A*رابط الرد للمسؤول:*%0A${finalLink}`;
        
        window.open(`https://wa.me/96566695443?text=${msg}`, '_blank');
    }

    // --- وظيفة الحفظ في قوقل شيت ---
    function saveData(mode) {
        const btn = event.target;
        btn.disabled = true;
        btn.innerText = "جاري الحفظ...";

        const data = {
            id: document.getElementById('id').value,
            auditor: document.getElementById('auditor').value,
            desc: document.getElementById('desc').value,
            action: document.getElementById('action') ? document.getElementById('action').value : "",
            manager: document.getElementById('managerName') ? document.getElementById('managerName').value : ""
        };

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
        .then(() => {
            alert("تم الحفظ بنجاح!");
            btn.disabled = false;
            btn.innerText = (mode === 'auditor') ? "💾 حفظ في السجل" : "✅ اعتماد الرد";
        })
        .catch(() => {
            alert("خطأ في الاتصال");
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
