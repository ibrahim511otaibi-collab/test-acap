<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الجودة - مركز الفروانية</title>
    <style>
        :root { --auditor-color: #2d5a27; --manager-color: #0056b3; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); padding: 20px; direction: rtl; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border-right: 10px solid; }
        .auditor-card { border-right-color: var(--auditor-color); }
        .manager-card { border-right-color: var(--manager-color); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; font-family: 'Segoe UI', sans-serif; }
        .locked { background-color: #f0f0f0; cursor: not-allowed; border: 1px dashed #ccc; color: #333; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn-save { background: var(--auditor-color); }
        .btn-wa { background: #25D366; }
        .btn-reply { background: var(--manager-color); }
        .btn:hover { opacity: 0.8; }
        .hidden { display: none; }
        h2, h3 { text-align: center; color: #444; }
        .info-box { background: #e8f4fd; border: 1px solid #b8d4e8; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .info-box p { margin: 5px 0; font-size: 15px; }
        .info-box strong { color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>نظام إدارة عدم المطابقة (NCR)</h2>

    <!-- بطاقة المدقق -->
    <div id="auditorBox" class="card auditor-card">
        <h3>📋 تسجيل حالة جديدة</h3>
        <div class="form-group">
            <label>رقم الحالة (ID):</label>
            <input type="text" id="id" class="locked" readonly>
        </div>
        <div class="form-group">
            <label>اسم المدقق:</label>
            <input type="text" id="auditor" placeholder="أدخل اسمك">
        </div>
        <div class="form-group">
            <label>مصدر الحالة:</label>
            <select id="source">
                <option value="شكوى">شكوى</option>
                <option value="تدقيق داخلي">تدقيق داخلي</option>
                <option value="ملاحظة">ملاحظة</option>
                <option value="تحليل بيانات">تحليل بيانات</option>
            </select>
        </div>
        <div class="form-group">
            <label>مستوى الخطورة:</label>
            <select id="risk">
                <option value="منخفضة">منخفضة</option>
                <option value="متوسطة">متوسطة</option>
                <option value="عالية">عالية</option>
            </select>
        </div>
        <div class="form-group">
            <label>وصف عدم المطابقة:</label>
            <textarea id="desc" rows="3" placeholder="اشرح الملاحظة هنا..."></textarea>
        </div>
        <div id="auditorButtons">
            <button class="btn btn-save" onclick="sendToGoogle('auditor')">💾 حفظ البيانات في الشيت</button>
            <button class="btn btn-wa" onclick="generateWALink()">📱 إرسال واتساب للمسؤول</button>
        </div>
    </div>

    <!-- بطاقة المدير - تظهر فقط لما يفتح الرابط -->
    <div id="managerBox" class="card manager-card hidden">
        <h3>🛠️ رد الإدارة والمسؤول</h3>

        <!-- عرض بيانات المدقق للمدير -->
        <div class="info-box">
            <p>📌 <strong>رقم الحالة:</strong> <span id="view_id"></span></p>
            <p>👤 <strong>المدقق:</strong> <span id="view_auditor"></span></p>
            <p>📂 <strong>المصدر:</strong> <span id="view_source"></span></p>
            <p>⚠️ <strong>الخطورة:</strong> <span id="view_risk"></span></p>
            <p>📝 <strong>الوصف:</strong> <span id="view_desc"></span></p>
        </div>

        <div class="form-group">
            <label>السبب الجذري (Root Cause):</label>
            <textarea id="rootCause" rows="3" placeholder="لماذا حدثت المشكلة؟"></textarea>
        </div>
        <div class="form-group">
            <label>الإجراء التصحيحي (Action):</label>
            <textarea id="action" rows="3" placeholder="ما هو الإجراء المتخذ؟"></textarea>
        </div>
        <div class="form-group">
            <label>اسم المسؤول المعتمد:</label>
            <input type="text" id="manager" placeholder="اسم المسؤول">
        </div>
        <button class="btn btn-reply" onclick="sendToGoogle('manager')">✅ إرسال الرد وتحديث السطر</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwQzvwODnfD7Syz-i1htjZDU36zcFhbJCN0lN69fM5Hij-2kwr-BVi_vbhkx9LQ7_Bu/exec";

    // ========== أول شيء يشتغل ==========
    (function init() {
        var search = window.location.search;
        if (!search || search.length < 2) {
            // وضع المدقق
            document.getElementById('id').value = "NCR-" + Math.floor(1000 + Math.random() * 9000);
            return;
        }

        // وضع المدير - قراءة الرابط يدوياً بدون URLSearchParams
        var params = {};
        var pairs = search.substring(1).split('&');
        for (var i = 0; i < pairs.length; i++) {
            var pair = pairs[i].split('=');
            if (pair.length === 2) {
                params[pair[0]] = decodeURIComponent(pair[1].replace(/\+/g, ' '));
            }
        }

        // التحقق إن في بيانات فعلاً
        if (!params['id']) {
            document.getElementById('id').value = "NCR-" + Math.floor(1000 + Math.random() * 9000);
            return;
        }

        // عرض البيانات في صندوق المعلومات
        document.getElementById('view_id').textContent      = params['id']  || '';
        document.getElementById('view_auditor').textContent = params['aud'] || '';
        document.getElementById('view_source').textContent  = params['src'] || '';
        document.getElementById('view_risk').textContent    = params['rsk'] || '';
        document.getElementById('view_desc').textContent    = params['dsc'] || '';

        // حفظ القيم في الحقول المخفية عشان ترسل مع الشيت
        document.getElementById('id').value      = params['id']  || '';
        document.getElementById('auditor').value = params['aud'] || '';
        document.getElementById('source').value  = params['src'] || '';
        document.getElementById('risk').value    = params['rsk'] || '';
        document.getElementById('desc').value    = params['dsc'] || '';

        // إخفاء بطاقة المدقق وإظهار بطاقة المدير
        document.getElementById('auditorBox').classList.add('hidden');
        document.getElementById('managerBox').classList.remove('hidden');
    })();

    // ========== حفظ في Google Sheets ==========
    function sendToGoogle(mode) {
        var btn = event.target;
        btn.disabled = true;
        btn.innerText = "جاري الحفظ...";

        var payload = {
            id:        document.getElementById('id').value,
            auditor:   document.getElementById('auditor').value,
            source:    document.getElementById('source').value,
            risk:      document.getElementById('risk').value,
            desc:      document.getElementById('desc').value,
            rootCause: document.getElementById('rootCause').value,
            action:    document.getElementById('action').value,
            manager:   document.getElementById('manager').value
        };

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(function() {
            alert(mode === 'auditor' ? "تم حفظ الحالة الجديدة في الشيت!" : "تم تحديث السجل بالرد النهائي!");
            btn.disabled = false;
            btn.innerText = mode === 'auditor' ? "💾 حفظ البيانات في الشيت" : "✅ إرسال الرد وتحديث السطر";
        })
        .catch(function() {
            alert("حدث خطأ في الاتصال.");
            btn.disabled = false;
        });
    }

    // ========== إرسال واتساب ==========
    function generateWALink() {
        var id  = document.getElementById('id').value;
        var aud = document.getElementById('auditor').value;
        var src = document.getElementById('source').value;
        var rsk = document.getElementById('risk').value;
        var dsc = document.getElementById('desc').value;

        if (!aud || !dsc) {
            alert("يرجى تعبئة اسم المدقق والوصف أولاً");
            return;
        }

        var baseUrl = "https://ibrahim511otaibi-collab.github.io/QualityFarwaniya/";

        var fullUrl = baseUrl
            + "?id="  + encodeURIComponent(id)
            + "&aud=" + encodeURIComponent(aud)
            + "&src=" + encodeURIComponent(src)
            + "&rsk=" + encodeURIComponent(rsk)
            + "&dsc=" + encodeURIComponent(dsc);

        var msg = "*تنبيه جودة (NCR)*"
            + "%0Aرقم الحالة: " + id
            + "%0Aالمدقق: " + encodeURIComponent(aud)
            + "%0Aالوصف: " + encodeURIComponent(dsc)
            + "%0A---"
            + "%0A*يرجى الرد عبر الرابط التالي:*"
            + "%0A" + encodeURIComponent(fullUrl);

        window.open("https://wa.me/96566695443?text=" + msg, '_blank');
    }
</script>

</body>
</html>
