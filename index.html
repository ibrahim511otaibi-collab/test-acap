<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام NCR - مركز الفروانية</title>
    <style>
        :root { --auditor-color: #2d5a27; --manager-color: #0056b3; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); padding: 20px; direction: rtl; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border-right: 8px solid; }
        .auditor-card { border-right-color: var(--auditor-color); }
        .manager-card { border-right-color: var(--manager-color); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .locked { background-color: #f0f0f0; cursor: not-allowed; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-save { background: var(--auditor-color); }
        .btn-wa { background: #25D366; }
        .btn-reply { background: var(--manager-color); }
        .hidden { display: none; }
        .radio-group { display: flex; flex-wrap: wrap; gap: 15px; background: #f9f9f9; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>نظام إدارة الجودة - مركز الفروانية</h2>

    <div id="auditorBox" class="card auditor-card">
        <h3>📋 تسجيل حالة عدم مطابقة</h3>
        <div class="form-group">
            <label>رقم الحالة:</label>
            <input type="text" id="case_id" class="locked" readonly>
        </div>
        <div class="form-group">
            <label>اسم المدقق:</label>
            <input type="text" id="auditor_name">
        </div>
        <div class="form-group">
            <label>مصدر الحالة:</label>
            <div class="radio-group">
                <label><input type="radio" name="source" value="شكوى"> شكوى</label>
                <label><input type="radio" name="source" value="تدقيق داخلي"> تدقيق داخلي</label>
                <label><input type="radio" name="source" value="ملاحظة"> ملاحظة</label>
                <label><input type="radio" name="source" value="تحليل بيانات"> تحليل بيانات</label>
                <label><input type="radio" name="source" value="مصدر آخر"> مصدر آخر</label>
            </div>
        </div>
        <div class="form-group">
            <label>الخطورة:</label>
            <select id="risk_level">
                <option value="منخفضة">منخفضة</option>
                <option value="متوسطة">متوسطة</option>
                <option value="عالية">عالية</option>
            </select>
        </div>
        <div class="form-group">
            <label>وصف الحالة:</label>
            <textarea id="desc" rows="3"></textarea>
        </div>
        <div id="auditorBtns">
            <button class="btn btn-save" onclick="sendData('auditor')">حفظ في السجل</button>
            <button class="btn btn-wa" onclick="sendWA()">إرسال للمسؤول (واتساب)</button>
        </div>
    </div>

    <div id="managerBox" class="card manager-card hidden">
        <h3>🛠️ الإجراء التصحيحي (رد المسؤول)</h3>
        <div class="form-group">
            <label>السبب الجذري (لماذا؟):</label>
            <textarea id="root_cause" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>الإجراء التصحيحي المتخذ:</label>
            <textarea id="action_plan" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>اسم المسؤول:</label>
            <input type="text" id="manager_name">
        </div>
        <button class="btn btn-reply" onclick="sendData('manager')">إرسال الرد النهائي</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwhDEfya6h-Tubr0evsvsLZIIW4Jq0RCjRkM4hW62XPqq4E_i6888oICoVyOAQC8wDq/exec";

    window.onload = function() {
        const p = new URLSearchParams(window.location.search);
        if (p.get('id')) {
            document.getElementById('case_id').value = p.get('id');
            document.getElementById('auditor_name').value = p.get('auditor');
            document.getElementById('risk_level').value = p.get('risk');
            document.getElementById('desc').value = p.get('desc');
            
            const src = p.get('source');
            document.querySelectorAll('input[name="source"]').forEach(r => {
                if(r.value === src) r.checked = true;
                r.disabled = true;
            });

            document.getElementById('auditor_name').disabled = true;
            document.getElementById('risk_level').disabled = true;
            document.getElementById('desc').disabled = true;
            document.getElementById('auditorBtns').classList.add('hidden');
            document.getElementById('managerBox').classList.remove('hidden');
        } else {
            document.getElementById('case_id').value = "NCR-" + Date.now().toString().slice(-6);
        }
    };

    function sendData(mode) {
        const data = {
            id: document.getElementById('case_id').value,
            auditor: document.getElementById('auditor_name').value,
            source: document.querySelector('input[name="source"]:checked')?.value || "",
            risk: document.getElementById('risk_level').value,
            desc: document.getElementById('desc').value,
            rootCause: document.getElementById('root_cause').value,
            action: document.getElementById('action_plan').value,
            manager: document.getElementById('manager_name').value
        };

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
        .then(() => alert("تمت العملية بنجاح!"))
        .catch(err => alert("خطأ في الاتصال"));
    }

    function sendWA() {
        const id = document.getElementById('case_id').value;
        const desc = document.getElementById('desc').value;
        const risk = document.getElementById('risk_level').value;
        const auditor = document.getElementById('auditor_name').value;
        const source = document.querySelector('input[name="source"]:checked')?.value || "";
        const url = window.location.origin + window.location.pathname + `?id=${id}&auditor=${encodeURIComponent(auditor)}&risk=${encodeURIComponent(risk)}&desc=${encodeURIComponent(desc)}&source=${encodeURIComponent(source)}`;
        const msg = `*تنبيه جودة*%0Aرقم: ${id}%0Aالوصف: ${desc}%0Aالرابط: ${url}`;
        window.open(`https://wa.me/96566695443?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
