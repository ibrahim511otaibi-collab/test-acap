<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>نظام الجودة - مركز الفروانية</title>
    <!-- خط Noto Sans Arabic (نفس خط الموقع الرئيسي) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (لأيقونات احترافية) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #097834;      /* الأخضر الأساسي */
            --secondary: #C7AC25;    /* الذهبي */
            --primary-dark: #065d28;
            --secondary-dark: #a88f1a;
            --bg-light: #F9FAFB;
            --card-white: #FFFFFF;
            --text-dark: #1E1E2F;
            --text-muted: #5A5A6E;
            --border-light: #E9ECEF;
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 20px 30px -12px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background: linear-gradient(145deg, #F1F5F9 0%, #EFF2F7 100%);
            padding: 30px 20px;
            direction: rtl;
            min-height: 100vh;
        }

        .container {
            max-width: 880px;
            margin: 0 auto;
        }

        /* ===== رأس الصفحة مع الشعار ===== */
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
            background: var(--card-white);
            padding: 15px 25px;
            border-radius: 40px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(9, 120, 52, 0.1);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-img {
            width: 55px;
            height: 55px;
            object-fit: contain;
            background: white;
            border-radius: 20px;
            padding: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .logo-text {
            line-height: 1.3;
        }
        .logo-text .org {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }
        .logo-text .center {
            font-size: 1rem;
            font-weight: 800;
            color: var(--primary);
        }
        .page-title {
            font-size: 1.35rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary-dark));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .badge-ncr {
            background: rgba(9, 120, 52, 0.1);
            padding: 6px 14px;
            border-radius: 40px;
            color: var(--primary);
            font-weight: 700;
            font-size: 0.8rem;
            border-right: 3px solid var(--secondary);
        }

        /* ===== البطاقات ===== */
        .card {
            background: var(--card-white);
            padding: 28px 30px;
            border-radius: 32px;
            box-shadow: var(--shadow-md);
            margin-bottom: 28px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .card:hover {
            box-shadow: 0 25px 35px -15px rgba(0,0,0,0.12);
        }
        .auditor-card {
            border-top: 6px solid var(--primary);
        }
        .manager-card {
            border-top: 6px solid var(--secondary);
        }
        .card h3 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dark);
            border-right: 5px solid;
            padding-right: 15px;
        }
        .auditor-card h3 {
            border-right-color: var(--primary);
        }
        .manager-card h3 {
            border-right-color: var(--secondary);
        }

        /* ===== الحقول ===== */
        .form-group {
            margin-bottom: 22px;
        }
        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-size: 0.9rem;
            letter-spacing: -0.2px;
        }
        label i {
            color: var(--secondary);
            margin-left: 6px;
            font-size: 0.85rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border-light);
            border-radius: 20px;
            box-sizing: border-box;
            font-size: 0.95rem;
            font-family: 'Noto Sans Arabic', sans-serif;
            transition: all 0.2s;
            background-color: #fff;
            color: #000 !important;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(9, 120, 52, 0.15);
        }
        .locked {
            background-color: #F8F9FC !important;
            cursor: not-allowed;
            border-color: #E2E8F0 !important;
            color: #2D3A4B !important;
            font-weight: 500;
            pointer-events: none;
        }

        /* ===== الأزرار ===== */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.3px;
        }
        .btn-save {
            background: var(--primary);
            color: white;
            box-shadow: 0 5px 12px rgba(9, 120, 52, 0.3);
        }
        .btn-save:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(9, 120, 52, 0.25);
        }
        .btn-reply {
            background: var(--secondary);
            color: #1E1E2F;
            box-shadow: 0 5px 12px rgba(199, 172, 37, 0.25);
        }
        .btn-reply:hover {
            background: var(--secondary-dark);
            transform: translateY(-2px);
            color: white;
        }
        hr {
            margin: 25px 0;
            border: 0;
            height: 1px;
            background: linear-gradient(to left, transparent, var(--border-light), transparent);
        }

        /* شاشة التحميل */
        #loadingScreen {
            display: none;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 40px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 20px;
            border: 1px solid rgba(199,172,37,0.3);
        }

        .hidden {
            display: none;
        }

        /* تحسينات الجوال */
        @media (max-width: 640px) {
            body {
                padding: 16px;
            }
            .card {
                padding: 20px;
            }
            .brand-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .page-title {
                font-size: 1.1rem;
            }
            .btn {
                padding: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- رأس الصفحة بالشعار -->
    <div class="brand-header">
        <div class="logo-area">
            <img class="logo-img" src="https://i.ibb.co/r2LcLwmn/logo.png" alt="شعار جمعية إحياء التراث الإسلامي" onerror="this.src='https://ui-avatars.com/api/?name=تراث&background=097834&color=fff'">
            <div class="logo-text">
                <div class="org">جمعية إحياء التراث الإسلامي</div>
                <div class="center">مركز محافظة الفروانية</div>
            </div>
        </div>
        <div class="page-title">
            نظام إدارة عدم المطابقة (NCR)
        </div>
        <div class="badge-ncr">
            ضبط الجودة
        </div>
    </div>

    <div id="loadingScreen">
        ⏳ جاري تحميل بيانات الحالة...
    </div>

    <!-- بطاقة المدقق -->
    <div id="auditorBox" class="card auditor-card">
        <h3>📋 تسجيل حالة جديدة</h3>
        <div class="form-group">
            <label><i class="fas fa-hashtag"></i> رقم الحالة (ID):</label>
            <input type="text" id="id" class="locked" readonly>
        </div>
        <div class="form-group">
            <label><i class="fas fa-user-check"></i> اسم مقدم الحالة:</label>
            <input type="text" id="auditor" placeholder="أدخل اسمك">
        </div>
        <div class="form-group">
            <label><i class="fas fa-building"></i> اسم القسم المعني:</label>
            <select id="department">
                <option value="">-- اختر القسم --</option>
                <option value="قسم الرعاية الاجتماعية">قسم الرعاية الاجتماعية</option>
                <option value="قسم حلقات تحفيظ القرآن">قسم حلقات تحفيظ القرآن</option>
                <option value="قسم الارشيف">قسم الارشيف</option>
                <option value="قسم الاستقبال">قسم الاستقبال</option>
                <option value="قسم الاستقطاعات">قسم الاستقطاعات</option>
                <option value="قسم الاشراف الفني">قسم الاشراف الفني</option>
                <option value="قسم الاشراف الاداري">قسم الاشراف الاداري</option>
                <option value="قسم الاعلامية والتسويق">قسم الاعلامية والتسويق</option>
                <option value="قسم ضبط الجودة">قسم ضبط الجودة</option>
                <option value="قسم الدعم الفني">قسم الدعم الفني</option>
                <option value="قسم الكلمة الطيبة">قسم الكلمة الطيبة</option>
                <option value="قسم اللجنة العلمية">قسم اللجنة العلمية</option>
                <option value="قسم المشاريع">قسم المشاريع</option>
                <option value="قسم النشء والشباب">قسم النشء والشباب</option>
            </select>
        </div>
        <div class="form-group">
            <label><i class="fas fa-exclamation-triangle"></i> مصدر الحالة:</label>
            <select id="source">
                <option value="شكوى">شكوى</option>
                <option value="تدقيق داخلي">تدقيق داخلي</option>
                <option value="ملاحظة">ملاحظة</option>
                <option value="تحليل بيانات">تحليل بيانات</option>
            </select>
        </div>
        <div class="form-group">
            <label><i class="fas fa-chart-line"></i> مستوى الخطورة:</label>
            <select id="risk">
                <option value="منخفضة">منخفضة</option>
                <option value="متوسطة">متوسطة</option>
                <option value="عالية">عالية</option>
            </select>
        </div>
        <div class="form-group">
            <label><i class="fas fa-file-alt"></i> وصف عدم المطابقة:</label>
            <textarea id="desc" rows="3" placeholder="اشرح حالة عدم المطابقة هنا..."></textarea>
        </div>
        <div id="auditorButtons">
            <button id="btnSave" class="btn btn-save" onclick="saveAndSendWA()">💾 حفظ وإرسال واتساب إلى الجهة المعنية</button>
        </div>
    </div>

    <!-- بطاقة المسؤول -->
    <div id="managerBox" class="card manager-card hidden">
        <h3>🛠️ رد الإدارة او المسؤول</h3>
        <div class="form-group">
            <label><i class="fas fa-hashtag"></i> رقم الحالة:</label>
            <input type="text" id="idDisplay" class="locked" readonly>
        </div>
        <div class="form-group">
            <label><i class="fas fa-user-check"></i> اسم مقدم الحالة:</label>
            <input type="text" id="auditorDisplay" class="locked" readonly>
        </div>
        <div class="form-group">
            <label><i class="fas fa-building"></i> اسم القسم:</label>
            <input type="text" id="departmentDisplay" class="locked" readonly>
        </div>
        <div class="form-group">
            <label><i class="fas fa-exclamation-triangle"></i> مصدر الحالة:</label>
            <input type="text" id="sourceDisplay" class="locked" readonly>
        </div>
        <div class="form-group">
            <label><i class="fas fa-chart-line"></i> مستوى الخطورة:</label>
            <input type="text" id="riskDisplay" class="locked" readonly>
        </div>
        <div class="form-group">
            <label><i class="fas fa-file-alt"></i> وصف عدم المطابقة:</label>
            <textarea id="descDisplay" rows="3" class="locked" readonly></textarea>
        </div>
        <hr>
        <div class="form-group">
            <label><i class="fas fa-search"></i> السبب الجذري لحدوث الحالة (Root Cause):</label>
            <textarea id="rootCause" rows="3" placeholder="لماذا حدثت المشكلة؟"></textarea>
        </div>
        <div class="form-group">
            <label><i class="fas fa-tools"></i> الإجراء التصحيحي لتجنب تكرار الحالة (Action):</label>
            <textarea id="action" rows="3" placeholder="ما هو الإجراء المتخذ؟"></textarea>
        </div>
        <div class="form-group">
            <label><i class="fas fa-user-tie"></i> اسم المسؤول المعتمد او من ينوب عنه:</label>
            <input type="text" id="manager" placeholder="اسم المسؤول">
        </div>
        <button class="btn btn-reply" onclick="sendToGoogle('manager')">✅  حفظ رد المسؤول</button>
    </div>
</div>

<script>
    // ===== جميع البيانات والدوال الأصلية دون أي تغيير =====
    const scriptURL = "https://script.google.com/macros/s/AKfycbzH8Dcwhkcr7fhZnDWxGYj9trniZnghg-8PAxp4b_oWucRtq4wx9KZk7qU0iq0Ht5ol/exec";
    const managerPortalURL = "https://ibrahim511otaibi-collab.github.io/test-acap/";

    function getParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    async function initPage() {
        const idVal = getParam('id');
        const loadingScreen = document.getElementById('loadingScreen');
        const auditorBox = document.getElementById('auditorBox');
        const managerBox = document.getElementById('managerBox');

        if (idVal) {
            // وضع المسؤول: إظهار شاشة التحميل وجلب البيانات
            auditorBox.classList.add('hidden');
            managerBox.classList.add('hidden');
            loadingScreen.style.display = 'block';
            loadingScreen.innerText = "⏳ جاري تحميل بيانات الحالة...";

            try {
                const response = await fetch(`${scriptURL}?id=${idVal}`);
                const data = await response.json();

                if (data && data.id) {
                    document.getElementById('idDisplay').value      = data.id       || "";
                    document.getElementById('auditorDisplay').value = data.auditor  || "";
                    document.getElementById('departmentDisplay').value = data.department || "";
                    document.getElementById('sourceDisplay').value  = data.source   || "";
                    document.getElementById('riskDisplay').value    = data.risk     || "";
                    document.getElementById('descDisplay').value    = data.desc     || "";

                    loadingScreen.style.display = 'none';
                    managerBox.classList.remove('hidden');
                } else {
                    loadingScreen.innerText = "⚠️ لم يتم العثور على بيانات لهذه الحالة.";
                }
            } catch (err) {
                console.error(err);
                loadingScreen.innerText = "❌ حدث خطأ في تحميل البيانات. حاول مرة أخرى.";
            }
        } else {
            // وضع المدقق: إخفاء شاشة التحميل وإظهار نموذج التسجيل
            loadingScreen.style.display = 'none';
            auditorBox.classList.remove('hidden');
            managerBox.classList.add('hidden');
            document.getElementById('id').value = "NCR-" + Math.floor(1000 + Math.random() * 9000);
        }
    }

    window.addEventListener('DOMContentLoaded', initPage);

    async function saveAndSendWA() {
        const id  = document.getElementById('id').value;
        const aud = document.getElementById('auditor').value;
        const dept = document.getElementById('department').value;
        const src = document.getElementById('source').value;
        const rsk = document.getElementById('risk').value;
        const dsc = document.getElementById('desc').value;

        if (!aud || !dsc) {
            alert("الرجاء تعبئة اسم مقدم الحالة والوصف قبل الإرسال.");
            return;
        }

        const btn = document.getElementById('btnSave');
        btn.disabled = true;
        btn.innerText = "⏳ جاري الحفظ...";

        const payload = {
            id, auditor: aud, department: dept, source: src, risk: rsk, desc: dsc,
            rootCause: "", action: "", manager: ""
        };

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            btn.innerText = "⏳ جاري توجيهك للواتساب...";
            const shortPageUrl = `${managerPortalURL}?id=${id}`;
            const msgText = `*تنبيه جودة (NCR)*\nرقم الحالة: ${id}\nالمدقق: ${aud}\nالقسم: ${dept}\nالوصف: ${dsc}\n---\n*يرجى الرد عبر الرابط التالي:*\n${shortPageUrl}`;
            window.location.href = `https://wa.me/96596690217?text=${encodeURIComponent(msgText)}`;

        } catch (err) {
            console.error(err);
            alert("حدث خطأ أثناء الحفظ. حاول مرة أخرى.");
            btn.disabled = false;
            btn.innerText = "💾 حفظ وإرسال واتساب إلى الجهة المعنية";
        }
    }

    function sendToGoogle(mode) {
        const btn = event.target;
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = "جاري الحفظ...";

        const payload = {
            id:        document.getElementById('idDisplay').value,
            auditor:   document.getElementById('auditorDisplay').value,
            department: document.getElementById('departmentDisplay').value,
            source:    document.getElementById('sourceDisplay').value,
            risk:      document.getElementById('riskDisplay').value,
            desc:      document.getElementById('descDisplay').value,
            rootCause: document.getElementById('rootCause').value || "",
            action:    document.getElementById('action').value    || "",
            manager:   document.getElementById('manager').value   || ""
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert("تم إرسال رد المسؤول وتحديث البيانات!");
            btn.disabled = false;
            btn.innerText = originalText;
        })
        .catch(err => {
            console.error(err);
            alert("حدث خطأ في الاتصال بالسيرفر.");
            btn.disabled = false;
            btn.innerText = originalText;
        });
    }
</script>

</body>
</html>
